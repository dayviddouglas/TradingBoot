name: JavaDoc

on:
  push:
    branches:
      - master

jobs:
  javadoc:
    name: Gerar e publicar JavaDoc
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache do Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compilar projeto
        run: mvn compile -DskipTests

      - name: Gerar JavaDoc
        run: mvn javadoc:javadoc -Dencoding=UTF-8 -Ddocencoding=UTF-8 -Dcharset=UTF-8 -DfailOnError=false

      - name: Verificar geração do JavaDoc
        run: |
          if [ ! -f "target/site/apidocs/apidocs/index.html" ]; then
            echo "❌ index.html não encontrado"
            exit 1
          fi
          echo "✅ JavaDoc gerado com sucesso"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload do JavaDoc
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/apidocs/apidocs

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4